# Pronghorn satellite configuration
# Runs on the satellite device (e.g., Pi Zero 2)

[audio]
sample_rate = 16000
channels = 1
sample_size = 2
preroll_frames = 15

[wake]
enabled = false
backend = "rustpotter"

[wake.rustpotter]
threshold = 0.5
avg_threshold = 0.2
eager = false
min_scores = 5
# [wake.rustpotter.wake_words]
# hey_pronghorn = "models/hey_pronghorn.rpw"

[transport]
server_address = "127.0.0.1:9999"
keepalive_interval_ms = 5000
