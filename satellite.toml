[audio]
sample_rate = 16000
channels = 1
sample_size = 2
preroll_frames = 15

[wake]
enabled = true
backend = "rustpotter"

[wake.rustpotter]
threshold = 0.4
avg_threshold = 0.15
eager = true
min_scores = 3

[wake.rustpotter.wake_words]
hey_jarvis = "models/hey_jarvis.rpw"

[transport]
server_address = "127.0.0.1:9999"
keepalive_interval_ms = 5000
# VAD settings
speech_threshold = 200
silence_duration_ms = 500
max_stream_duration_ms = 15000
min_speech_ms = 300
