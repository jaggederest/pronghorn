[audio]
sample_rate = 16000
channels = 1
sample_size = 2

[transport]
bind_address = "0.0.0.0:9999"
jitter_buffer_delay = 3
keepalive_interval_ms = 5000
session_timeout_ms = 30000

[pipeline.stt]
backend = "sherpa"

[pipeline.stt.sherpa]
model_dir = "models/sherpa-zipformer-en-offline"

# [pipeline.stt]
# backend = "whisper"
# [pipeline.stt.whisper]
# model_dir = "models/whisper-base"
# language = "en"

[pipeline.tts]
backend = "sherpa-kokoro"

[pipeline.tts.sherpa_kokoro]
model_dir = "models/sherpa-kokoro"
speaker_id = 3    # kokoro-en-v0_19 speaker IDs 0-10
speed = 1.0

# [pipeline.tts]
# backend = "kokoro"
# [pipeline.tts.kokoro]
# model_path = "models/kokoro/model_quantized.onnx"
# tokenizer_path = "models/kokoro/tokenizer.json"
# voices_path = "models/kokoro/voices"
# voice = "bm_daniel"

[pipeline.intent]
backend = "ollama"

[pipeline.intent.ollama]
url = "http://localhost:11434"
model = "gemma3:1b"
system_prompt = "You are Jarvis, a helpful voice assistant. Keep responses brief and conversational (1-2 sentences)."
