[audio]
sample_rate = 16000
channels = 1
sample_size = 2

[transport]
bind_address = "0.0.0.0:9999"
jitter_buffer_delay = 3
keepalive_interval_ms = 5000
session_timeout_ms = 30000

[pipeline.stt]
backend = "sherpa"

[pipeline.stt.sherpa]
model_dir = "models/sherpa-onnx-streaming-zipformer-en-20M-2023-02-17"

# [pipeline.stt]
# backend = "whisper"
# [pipeline.stt.whisper]
# model_dir = "models/whisper-base"
# language = "en"

[pipeline.tts]
backend = "kokoro"

[pipeline.tts.kokoro]
model_path = "models/kokoro/model_quantized.onnx"
tokenizer_path = "models/kokoro/tokenizer.json"
voices_path = "models/kokoro/voices"
voice = "bm_daniel"

[pipeline.vad]
model_path = "models/silero_vad.onnx"
min_silence_duration = 0.5
min_speech_duration = 0.25
threshold = 0.5

[pipeline.intent]
backend = "ollama"

[pipeline.intent.ollama]
url = "http://localhost:11434"
model = "gemma3:1b"
system_prompt = "You are Jarvis, a helpful voice assistant. Keep responses brief and conversational (1-2 sentences)."
